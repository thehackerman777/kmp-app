name: Build & Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  ANDROID_COMPILE_SDK: 34

jobs:
  build:
    name: Build All Targets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ──────────────────────────────────────────────
      # 1. ANDROID APK
      # ──────────────────────────────────────────────
      - name: Build Android APK (Debug)
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Build Android APK (Release - Signed)
        run: ./gradlew :androidApp:assembleRelease --no-daemon

      - name: Upload APK Debug — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: androidApp/build/outputs/apk/debug/*.apk
          compression-level: 0

      - name: Upload APK Release — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release
          path: androidApp/build/outputs/apk/release/*.apk
          compression-level: 0

      # ──────────────────────────────────────────────
      # 2. DESKTOP APP
      # ──────────────────────────────────────────────
      - name: Build Desktop App
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --no-daemon

      - name: Upload Desktop App — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-linux
          path: desktopApp/build/compose/binaries/
          if-no-files-found: warn

      # ──────────────────────────────────────────────
      # 3. BACKEND JAR
      # ──────────────────────────────────────────────
      - name: Build Backend JAR
        run: ./gradlew :backend:jar --no-daemon

      - name: Upload Backend — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          compression-level: 0

      # ──────────────────────────────────────────────
      # 4. WEB APP
      # ──────────────────────────────────────────────
      - name: Build Web App
        run: |
          cd webApp
          npm ci
          npx vite build

      - name: Upload Web App — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: webApp/dist/
          compression-level: 0

      # ──────────────────────────────────────────────
      # 5. RELEASE (only on tag push v*)
      # ──────────────────────────────────────────────
      - name: Create Release & Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            androidApp/build/outputs/apk/debug/*.apk
            androidApp/build/outputs/apk/release/*.apk
            backend/build/libs/*.jar
            desktopApp/build/compose/binaries/main/**
          fail_on_unmatched_files: false

      # ──────────────────────────────────────────────
      # 6. GITHUB PAGES (web app - main branch only)
      # ──────────────────────────────────────────────
      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: webApp/dist/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
