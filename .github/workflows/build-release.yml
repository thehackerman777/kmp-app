name: Build & Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  ANDROID_COMPILE_SDK: 34

jobs:
  build:
    name: Build All Targets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ──────────────────────────────────────────────
      # 1. ANDROID APK (Debug)
      # ──────────────────────────────────────────────
      - name: Build Android APK (Debug)
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Upload APK (Debug) — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: androidApp/build/outputs/apk/debug/*.apk
          compression-level: 0

      # ──────────────────────────────────────────────
      # 2. ANDROID APK (Release) — unsigned but usable
      # ──────────────────────────────────────────────
      - name: Build Android APK (Release)
        run: ./gradlew :androidApp:assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload APK (Release) — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release
          path: androidApp/build/outputs/apk/release/*.apk
          compression-level: 0
        continue-on-error: true

      # ──────────────────────────────────────────────
      # 3. DESKTOP APP
      # ──────────────────────────────────────────────
      - name: Build Desktop App
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --no-daemon

      - name: Upload Desktop App — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-linux
          path: desktopApp/build/compose/binaries/
          if-no-files-found: warn

      # ──────────────────────────────────────────────
      # 4. BACKEND JAR
      # ──────────────────────────────────────────────
      - name: Build Backend JAR
        run: ./gradlew :backend:jar --no-daemon

      - name: Upload Backend — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          compression-level: 0

      # ──────────────────────────────────────────────
      # 5. WEB APP
      # ──────────────────────────────────────────────
      - name: Build Web App
        run: |
          cd webApp
          npm ci
          npx vite build

      - name: Upload Web App — Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: webApp/dist/
          compression-level: 0

      # ──────────────────────────────────────────────
      # 6. GITHUB PAGES (web app)
      # ──────────────────────────────────────────────
      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: webApp/dist/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

      # ──────────────────────────────────────────────
      # 7. RELEASE ASSETS (when tag is pushed)
      # ──────────────────────────────────────────────
      - name: Upload Assets to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: |
            androidApp/build/outputs/apk/debug/*.apk
            androidApp/build/outputs/apk/release/*.apk
            backend/build/libs/*.jar
            webApp/dist/
          tag: ${{ github.ref }}
          file_behavior: replace
          overwrite: true
          body: |
            ## 📦 Release ${{ github.ref_name }}

            ### Cambios
            _Automatically generated from commit ${{ github.sha }}_

            ### Archivos
            - `android-app-debug.apk` — App Android (firma debug)
            - `android-app-release.apk` — App Android (sin firmar)
            - `backend.jar` — Backend Ktor
            - `web-app/` — Frontend web estático
