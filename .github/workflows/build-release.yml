name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Android APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: androidApp/build/outputs/apk/debug/*.apk
          tag: ${{ github.ref }}
          file_behavior: replace
          overwrite: true

      - name: Build Backend JAR
        run: ./gradlew :backend:jar

      - name: Upload Backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar

      - name: Build Desktop App
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app
          path: desktopApp/build/compose/binaries/

      - name: Build Web App
        run: |
          cd webApp
          npm ci
          npx vite build

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: webApp/dist/
